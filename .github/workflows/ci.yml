name: CI

on:
  push:
    branches:
      - main
      - master
      - "**"
  pull_request:

jobs:
  build-and-test:
    name: Build and Validate (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Toolchain
        run: |
          uname -a
          cc --version || true
          make --version || true

      - name: Validate SemVer
        run: make check-version

      - name: Build
        run: make -j4

      - name: Smoke Test (Ubuntu)
        if: runner.os == 'Linux'
        run: make smoke
